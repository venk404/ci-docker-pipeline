# SonarQube Project Configuration for CI Docker Pipeline
# This file is configured specifically for your FastAPI Python project

# ===================================
# REQUIRED: Project Information
# ===================================

# Project key - Must match the project key in SonarQube
sonar.projectKey=dodo-payments

# Project name - This will appear in SonarQube dashboard
sonar.projectName=Dodo Payments - CI Docker Pipeline

# Version
sonar.projectVersion=1.0


# ===================================
# Source Code Configuration
# ===================================

# Source code directories to analyze
sonar.sources=code

# Test directories
sonar.tests=test

# Encoding
sonar.sourceEncoding=UTF-8


# ===================================
# Python Specific Settings
# ===================================

# Python version
sonar.python.version=3.9

# Coverage report path (generated by pytest)
sonar.python.coverage.reportPaths=coverage.xml


# ===================================
# Exclusions
# ===================================

# Files and directories to exclude from analysis
sonar.exclusions=\
  **/venv/**,\
  **/env/**,\
  **/__pycache__/**,\
  **/migrations/**,\
  **/DB/**,\
  **/.pytest_cache/**,\
  **/docker-compose.yml,\
  **/Dockerfile,\
  **/Makefile,\
  **/setup.sh,\
  **/*.md

# Test files exclusions from duplications and coverage
sonar.coverage.exclusions=\
  **/test/**,\
  **/tests/**

sonar.cpd.exclusions=\
  **/test/**,\
  **/tests/**


# ===================================
# Code Quality Settings
# ===================================

# Disable some rules if needed (uncomment to use)
# sonar.issue.ignore.multicriteria=e1
# sonar.issue.ignore.multicriteria.e1.ruleKey=python:S1192
# sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.py
