name: Build the PR

on:
  push:
    branches: [ "main" ]
    paths:
      - 'code/**'
      - 'test/**'
      - 'DB/Schemas/**'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'code/**'
      - 'test/**'
      - 'DB/Schemas/**'
    branches:
      - master
      - main
  workflow_dispatch:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual build request'

jobs:
  build:
    runs-on: self-hosted
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  
      
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.13'
      
      - name: Cache pip packages and venv
        id: cache-dependencies
        uses: actions/cache@v3
        timeout-minutes: 5
        continue-on-error: true
        with:
          path: |
            ~/.cache/pip
            ./venv
          key: ${{ runner.os }}-venv-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-venv-
            ${{ runner.os }}-pip-
            
      - name: Install system dependencies (OS-specific)
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            echo "Installing Linux dependencies..."
            chmod +x ./setup.sh
            sudo ./setup.sh
            sudo apt install -y jq
            sudo apt-get update
            sudo apt-get install -y gcc libc6-dev libpq-dev libpq5
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            echo "Running on macOS - checking dependencies..."
            # Check Docker
            if ! docker info > /dev/null 2>&1; then
              echo "ERROR: Docker is not running. Please start Docker Desktop."
              exit 1
            fi
            echo "✓ Docker is running"
            
            # Check Make
            if ! command -v make &> /dev/null; then
              echo "Installing make..."
              brew install make
            fi
            echo "✓ Make is available"
            
            # Check jq
            if ! command -v jq &> /dev/null; then
              echo "Installing jq..."
              brew install jq
            fi
            echo "✓ jq is available"
            
            # Install PostgreSQL for psycopg2
            if ! brew list postgresql &> /dev/null; then
              echo "Installing PostgreSQL client..."
              brew install postgresql
            fi
            echo "✓ PostgreSQL client is available"
            
            echo "All macOS dependencies are ready!"
          fi
        shell: bash

      - name: Get version from Git tags
        id: get_versions
        run: |
          RESTAPI_VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
          echo "RESTAPI_VERSION=$RESTAPI_VERSION" >> $GITHUB_OUTPUT
        shell: bash

      - name: Run Flake8
        run: make Code_linting

      - name: Run the application for testing
        env:
          APP_PORT: ${{ secrets.APP_PORT }}
          HOST: ${{ secrets.HOST }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          tags: ${{ steps.get_versions.outputs.RESTAPI_VERSION }}
          Docker_Username: ${{ vars.DOCKERHUB_USERNAME }}
        run: make all

      - name: Run tests
        run: make test
      

          
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push REST API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: docker.io/${{ vars.DOCKERHUB_USERNAME }}/studentapi:${{ steps.get_versions.outputs.RESTAPI_VERSION }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.get_versions.outputs.RESTAPI_VERSION }}
          outputs: type=registry
      

      - name: Build client payload
        id: build-payload
        run: |
          # Create JSON payload using jq directly (cleaner approach)
          payload=$(jq -n \
            --arg version "${{ steps.get_versions.outputs.RESTAPI_VERSION }}" \
            --arg repo "${{ github.repository }}" \
            --arg image "docker.io/${{ vars.DOCKERHUB_USERNAME }}/studentapi:${{ steps.get_versions.outputs.RESTAPI_VERSION }}" \
            '{
              restapi_version: $version,
              repository: $repo,
              images: [$image]
            }')
          
          # Debug: Show the payload
          echo "Generated payload:"
          echo "$payload" | jq .
          
          # Save to GitHub output for use in next step
          {
            echo "payload<<EOF"
            echo "$payload"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Trigger CD workflow in another repository
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.PAT_TOKEN }}
          repository: venk404/venk404-Implementing-Continuous-Delivery-with-ArgoCD
          event-type: update-image
          client-payload: ${{ steps.build-payload.outputs.payload }}
      
      - name: Stop the application
        env:
          APP_PORT: ${{ secrets.APP_PORT }}
          HOST: ${{ secrets.HOST }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          tags: ${{ steps.get_versions.outputs.RESTAPI_VERSION }}
          Docker_Username: ${{ vars.DOCKERHUB_USERNAME }}
        run: make down

      - name: Clean up
        run: make clean

  sonarqube:
    name: SonarQube Code Analysis
    runs-on: self-hosted
    needs: build  # Run after build job completes
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.13'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      
      - name: Run tests with coverage
        run: |
          pytest --cov=code --cov-report=xml:coverage.xml --cov-report=term
        continue-on-error: true
      
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      
      - name: SonarQube Quality Gate check
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        continue-on-error: true
