name: SonarQube Code Analysis (Test)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  sonarqube-analysis:
    name: SonarQube Analysis
    runs-on: self-hosted  # Uses your local Mac runner (can access internal SonarQube server)
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full git history for better analysis
      
      - name: Set up Python (use system Python)
        run: |
          echo "Using system Python"
          python3 --version || python --version
          which python3 || which python
      
      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip --user || true
          python3 -m pip install -r requirements.txt --user || true
          python3 -m pip install pytest pytest-cov flake8 --user
      
      - name: Run tests with coverage
        run: |
          python3 -m pytest --cov=code --cov-report=xml:coverage.xml --cov-report=term || true
        continue-on-error: true
      
      - name: Run Flake8 linting
        run: |
          python3 -m flake8 code/ --count --select=E9,F63,F7,F82 --show-source --statistics || true
        continue-on-error: true
      
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=venk404_ci-docker-pipeline
            -Dsonar.projectName="CI Docker Pipeline"
            -Dsonar.sources=code
            -Dsonar.tests=test
            -Dsonar.python.version=3.13
            -Dsonar.coverage.exclusions=**/*
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.exclusions=**/venv/**,**/__pycache__/**,**/actions-runner/**,**/DB/**
            -Dsonar.qualitygate.wait=false
        continue-on-error: true
